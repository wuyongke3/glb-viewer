<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e9cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5fd9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3db4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e9cff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)"/>

  <!-- 3D 立方体 -->
  <g transform="translate(128, 128)">
    <!-- 后面 -->
    <polygon points="0,-60 52,-30 52,30 0,60" fill="url(#grad2)" opacity="0.6"/>
    <!-- 左面 -->
    <polygon points="-52,-30 0,-60 0,60 -52,30" fill="#ffffff" opacity="0.9"/>
    <!-- 顶面 -->
    <polygon points="0,-60 52,-30 0,0 -52,-30" fill="#ffffff"/>
    <!-- 右面 -->
    <polygon points="52,-30 52,30 0,0 0,-60" fill="url(#grad2)" opacity="0.8"/>

    <!-- 光泽效果 -->
    <polygon points="-52,-30 0,-60 52,-30 0,0" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- 放大镜符号 -->
  <g transform="translate(180, 180)">
    <circle cx="0" cy="0" r="24" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>
    <line x1="17" y1="17" x2="36" y2="36" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>